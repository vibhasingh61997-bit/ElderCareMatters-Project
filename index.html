<!DOCTYPE html>
<html>
<head>
  <title>ElderCareMatters</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      text-align: center;
    }

    .hero {
      background: #2b6cb0;
      color: white;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.9;
    }

    .search-box {
      margin-top: 20px;
    }

    input {
      padding: 12px;
      width: 200px;
      border: none;
      border-radius: 6px;
      margin-right: 10px;
    }

    button {
      padding: 12px 20px;
      background: #48bb78;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .section {
      padding: 40px 20px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Find the Right Elder Care, Close to Home</h1>
    <p>We match you with trusted local providers</p>

    <div class="search-box">
      <input placeholder="Enter ZIP code">
      <button>Find Care</button>
    </div>
  </div>

  <div class="section">
    <h2>Browse by Care Type</h2>

    <div class="cards">
      <div class="card">🏠 Home Care</div>
      <div class="card">🏡 Assisted Living</div>
      <div class="card">🧠 Memory Care</div>
      <div class="card">⚖️ Elder Law</div>
    </div>
  </div>

</body>
</html>
